<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>RospOS VM</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0c1117;
      --panel: rgba(16, 23, 33, 0.92);
      --panel-strong: #131b26;
      --text: #e6edf3;
      --muted: #9ca9b8;
      --accent: #6ce2b2;
      --accent-strong: #2ad39b;
      --border: rgba(255, 255, 255, 0.08);
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(108, 226, 178, 0.16), transparent 32%),
        radial-gradient(circle at top right, rgba(75, 138, 255, 0.12), transparent 28%),
        linear-gradient(180deg, #091018 0%, var(--bg) 100%);
      overflow: hidden;
    }

    .shell {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 16px;
      padding: 18px;
    }

    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 20px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(22, 31, 44, 0.94), rgba(14, 19, 27, 0.95));
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .title-block {
      min-width: 0;
    }

    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 12px;
      color: var(--accent);
      margin-bottom: 8px;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 3vw, 40px);
      line-height: 1.05;
    }

    .subtitle {
      margin: 8px 0 0;
      max-width: 72ch;
      color: var(--muted);
      line-height: 1.45;
      font-size: 14px;
    }

    .badge {
      flex: 0 0 auto;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(108, 226, 178, 0.25);
      background: rgba(108, 226, 178, 0.08);
      color: #c8ffe9;
      font-size: 13px;
      white-space: nowrap;
    }

    .frame-wrap {
      position: relative;
      min-height: 0;
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .frame-glow {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(135deg, rgba(108, 226, 178, 0.08), transparent 30%, transparent 70%, rgba(75, 138, 255, 0.08));
      z-index: 1;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
      position: relative;
      z-index: 0;
    }

    @media (max-width: 800px) {
      .shell {
        padding: 12px;
        gap: 12px;
      }

      .hero {
        align-items: flex-start;
        flex-direction: column;
      }

      .badge {
        align-self: flex-start;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="title-block">
        <div class="eyebrow">RospOS Web</div>
        <h1>RospOS VM in the browser</h1>
        <p class="subtitle">
          This wrapper page hosts the Qt WebAssembly build in an iframe so the existing debugger UI can run as a website without changing the VM.
        </p>
      </div>
      <div class="badge">Load <strong>.rosp</strong> binaries in-browser</div>
    </section>

    <section class="frame-wrap" aria-label="RospOS Qt WebAssembly application">
      <div class="frame-glow"></div>
      <iframe id="app-frame" title="RospOS VM" src="rospovm_html.html"></iframe>
    </section>
  </main>
</body>
</html>
